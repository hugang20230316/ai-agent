name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify agent rules
        run: python3 scripts/verify_agent_rules.py

      - name: Check dangerous deletions
        env:
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD: ${{ github.sha }}
        run: |
          python3 scripts/check_dangerous_deletions.py --base "$BASE" --head "$HEAD"

  setup-scripts:
    name: Setup scripts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile setup scripts
        run: python -m py_compile scripts/doctor.py scripts/setup_links.py

      - name: Check print-only setup paths
        env:
          CODEX_HOME: ${{ runner.temp }}/codex home
          CLAUDE_HOME: ${{ runner.temp }}/claude home
          HERMES_HOME: ${{ runner.temp }}/hermes home
          OPENCLAW_HOME: ${{ runner.temp }}/openclaw home
          OPENCLAW_WORKSPACE: ${{ runner.temp }}/openclaw workspace
        run: |
          python scripts/setup_links.py --tool codex --rules --print-only
          python scripts/setup_links.py --tool codex --skills multi-agent-workflow --print-only
          python scripts/setup_links.py --tool hermes --skills multi-agent-workflow --print-only
          python scripts/setup_links.py --tool openclaw --skills multi-agent-workflow --print-only
          python scripts/doctor.py --tool codex --tool claude --tool hermes --tool openclaw --skills multi-agent-workflow --no-verify

      - name: Apply setup in temporary tool homes
        env:
          CODEX_HOME: ${{ runner.temp }}/codex home
          CLAUDE_HOME: ${{ runner.temp }}/claude home
          HERMES_HOME: ${{ runner.temp }}/hermes home
          OPENCLAW_HOME: ${{ runner.temp }}/openclaw home
          OPENCLAW_WORKSPACE: ${{ runner.temp }}/openclaw workspace
        run: |
          python scripts/setup_links.py --tool codex --tool claude --tool hermes --tool openclaw --rules --skills multi-agent-workflow --apply
          python scripts/doctor.py --tool codex --tool claude --tool hermes --tool openclaw --skills multi-agent-workflow --no-verify --strict

      - name: Reject all-skills setup
        run: python -c "import subprocess, sys; result = subprocess.run([sys.executable, 'scripts/setup_links.py', '--tool', 'codex', '--skills', 'all', '--print-only']); sys.exit(0 if result.returncode == 2 else 1)"
